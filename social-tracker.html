  .cl-groups { display:grid; grid-template-columns:1fr 1fr; gap:0 24px; }

  .cl-box { width:16px; height:16px; border:1.5px solid #B0E0E0; border-radius:4px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }

  .cl-item.done .cl-box { background:#3DB8B8; border-color:#3DB8B8; }

  .cl-label { font-size:13px; color:#1A2E2E; line-height:1.4; }

// Firebase — real-time checklist sync across all devices
const firebaseConfig = {
  apiKey: "AIzaSyCaXK625gdp6jlrjM2Zn-SdLcFM25kb1v8",
  authDomain: "myles-social-tracker.firebaseapp.com",
  databaseURL: "https://myles-social-tracker-default-rtdb.europe-west1.firebasedatabase.app",

};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const TODAY = new Date().toISOString().slice(0, 10);
const clRef = db.ref('checklist/' + TODAY);
let currentClState = {};

function renderChecklist(state) {
  state = state || {};
  const el = document.getElementById('cl-groups');
  el.innerHTML = '';
  let total = 0, done = 0;

  CHECKLIST.forEach(section => {
    const col = document.createElement('div');
    col.className = 'cl-group';
    col.innerHTML = `<div class="cl-group-label">${section.group}</div>`;

    section.items.forEach(item => {
      const id = section.group + ':' + item;
      const isDone = !!state[id];
      total++; if (isDone) done++;
      const row = document.createElement('div');
      row.className = 'cl-item' + (isDone ? ' done' : '');
      row.innerHTML = `
        <div class="cl-box">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="cl-label">${item}</span>`;
      row.addEventListener('click', () => {
        const newState = { ...currentClState };
        newState[id] = !newState[id];
        clRef.set(newState);
      });
      col.appendChild(row);
    });
    el.appendChild(col);
  });

  document.getElementById('cl-count').textContent = done + ' / ' + total;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('cl-bar').style.width = pct + '%';
  const doneMsg = document.getElementById('cl-done');
  doneMsg.style.display = (done === total && total > 0) ? 'block' : 'none';
}

function resetChecklist() {
  clRef.set({});
}

// Real-time listener — fires instantly on any device when state changes
clRef.on('value', snapshot => {
  currentClState = snapshot.val() || {};
  renderChecklist(currentClState);
});

document.getElementById('date-line').textContent = 'Last updated: ' + META.date + ' · ' + META.time;

function fmtNum(n) {
  if (n === null || n === undefined) return '—';
  if (typeof n === 'string') return n;
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function trendHtml(t) {
  if (t === 'up')   return '<span class="trend trend-up">↑ Growing</span>';
  if (t === 'down') return '<span class="trend trend-down">↓ Dropping</span>';
  return '<span class="trend trend-flat">→ Flat</span>';
}

function changeHtml(v) {
  if (v === null || v === undefined) return '<span class="fchange fchange-neu">No data yet</span>';
  if (v === 0) return '<span class="fchange fchange-neu">No change this week</span>';
  const cls = v > 0 ? 'fchange-pos' : 'fchange-neg';
  return `<span class="fchange ${cls}">${v > 0 ? '+' : ''}${v.toLocaleString()} this week</span>`;
}

function engColor(r) {
  if (r >= 6) return '#3DB8B8';
  if (r >= 3) return '#6B8F8F';
  return '#791F1F';
}

/* Platform cards */
const pcEl = document.getElementById('platform-cards');
const pColorClass = { ig: 'pcard-ig', tt: 'pcard-tt', yt: 'pcard-yt' };
const pReachLabel = { ig: 'Weekly reach', tt: 'Weekly views', yt: 'Weekly views' };

['ig', 'tt', 'yt'].forEach(k => {
  const p = PLATFORMS[k];
  pcEl.innerHTML += `
    <div class="pcard ${pColorClass[k]}">
      <div class="pcard-top">
        <div>
          <div class="pcard-name">${p.label}</div>
          <div class="pcard-handle">${p.handle}</div>
        </div>
        ${trendHtml(p.trend)}
      </div>
      <div class="followers">${p.followers !== null ? p.followers.toLocaleString() : '—'}</div>
      ${changeHtml(p.followersChange)}
      <div class="pstats">
        <div>
          <div class="pstat-lbl">${pReachLabel[k]}</div>
          <div class="pstat-val">${p.weeklyReach || p.weeklyViews || '—'}</div>
        </div>
        <div>
          <div class="pstat-lbl">Avg eng rate</div>
          <div class="pstat-val">${p.avgEngRate || '—'}</div>
        </div>
      </div>
    </div>`;
});

/* Analysis */
document.getElementById('a-text').textContent = ANALYSIS.text;
const pillsEl = document.getElementById('a-pills');
(ANALYSIS.pills || []).forEach(p => {
  const cls = p.type === 'green' ? 'a-pill-green' : p.type === 'amber' ? 'a-pill-amber' : p.type === 'red' ? 'a-pill-red' : 'a-pill';
  pillsEl.innerHTML += `<span class="a-pill ${cls}">${p.label}</span>`;
});

/* Posts table */
const plabels = { ig: 'Instagram', tt: 'TikTok', yt: 'YouTube' };
const pbadges = { ig: 'b-ig', tt: 'b-tt', yt: 'b-yt' };

function renderPosts(f) {
  const body = document.getElementById('posts-body');
  if (!POSTS.length) {
    body.innerHTML = `<tr><td colspan="10"><div class="empty">No posts yet — run the daily update to populate this table with your latest content analytics.</div></td></tr>`;
    return;
  }
  const items = POSTS.filter(p => {
    if (f === 'ig')   return p.platform === 'ig';
    if (f === 'tt')   return p.platform === 'tt';
    if (f === 'yt')   return p.platform === 'yt';
    if (f === 'hot')  return p.perf === 'hot';
    if (f === 'cold') return p.perf === 'cold';
    return true;
  });
  if (!items.length) {
    body.innerHTML = `<tr><td colspan="10"><div class="empty">No posts match this filter.</div></td></tr>`;
    return;
  }
  const maxEng = Math.max(...items.map(p => p.engRate || 0), 1);
  body.innerHTML = items.map(p => `
    <tr>
      <td class="post-title" title="${p.title}">${p.title}</td>
      <td><span class="pbadge ${pbadges[p.platform]}">${plabels[p.platform]}</span></td>
      <td><span class="fmt-tag">${p.format}</span></td>
      <td class="post-date">${p.date}</td>
      <td class="num">${fmtNum(p.views)}</td>
      <td class="num">${fmtNum(p.likes)}</td>
      <td class="num">${fmtNum(p.comments)}</td>
      <td class="num">${fmtNum(p.savesShares)}</td>
      <td>
        <div class="eng-cell">
          <span style="font-size:12px;font-weight:500;color:${engColor(p.engRate||0)};min-width:34px">${p.engRate != null ? p.engRate.toFixed(1) + '%' : '—'}</span>
          <div class="eng-bar-bg"><div class="eng-bar" style="width:${Math.round(((p.engRate||0)/maxEng)*100)}%;background:${engColor(p.engRate||0)}"></div></div>
        </div>
      </td>
      <td><span class="${p.perf==='hot'?'perf-top':p.perf==='cold'?'perf-low':'perf-avg'}">${p.perf==='hot'?'Top post':p.perf==='cold'?'Low perf':'Average'}</span></td>
    </tr>`).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]');
  if (!btn) return;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('on', b === btn));
  renderPosts(btn.dataset.f);
});

renderPosts('all');

/* Format breakdown */
const bdEl = document.getElementById('breakdown');
if (!FORMATS.length) {
  bdEl.innerHTML = `<div class="bcard" style="grid-column:1/-1"><div class="bcard-title">Format & platform breakdown</div><div class="empty" style="padding:1.5rem 0">Run the daily update to see which content formats and platforms are performing best.</div></div>`;
} else {
  const sorted = [...FORMATS].sort((a,b) => b.avgEngRate - a.avgEngRate);
  const maxF = sorted[0].avgEngRate;
  const fRows = sorted.map((f,i) => `
    <div class="brow">
      <span class="brow-name">${f.name} <span style="color:#ccc;font-size:11px">(${f.count})</span></span>
      <div class="brow-bar-bg"><div class="brow-bar" style="width:${Math.round((f.avgEngRate/maxF)*100)}%;opacity:${Math.max(0.4, 1-i*0.18)}"></div></div>
      <span class="brow-val">${f.avgEngRate.toFixed(1)}%</span>
    </div>`).join('');

  const byPlat = {};
  POSTS.forEach(p => {
    if (!byPlat[p.platform]) byPlat[p.platform] = [];
    byPlat[p.platform].push(p.engRate || 0);
  });
  const platAvgs = Object.entries(byPlat).map(([k,vals]) => ({
    label: plabels[k], avg: vals.reduce((s,v)=>s+v,0)/vals.length
  })).sort((a,b)=>b.avg-a.avg);
  const maxP = platAvgs[0]?.avg || 1;
  const pRows = platAvgs.map(p => `
    <div class="brow">
      <span class="brow-name">${p.label}</span>
      <div class="brow-bar-bg"><div class="brow-bar" style="width:${Math.round((p.avg/maxP)*100)}%"></div></div>
      <span class="brow-val">${p.avg.toFixed(1)}%</span>
    </div>`).join('');

  bdEl.innerHTML = `
    <div class="bcard">
      <div class="bcard-title">Format leaderboard</div>
      ${fRows}
    </div>
    <div class="bcard">
      <div class="bcard-title">Platform avg engagement</div>
      ${pRows}
    </div>`;
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
